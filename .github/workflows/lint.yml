# .github/workflows/lint.yml
name: "Lint"

on:
  push:
    paths:
      - "designs/**/*.py"
      - "verify_hardware.py"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "designs/**/*.py"
      - "verify_hardware.py"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  lint:
    name: "Ruff (Python)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint all Python
        run: |
          uv run --extra dev ruff check \
            designs/ \
            verify_hardware.py
