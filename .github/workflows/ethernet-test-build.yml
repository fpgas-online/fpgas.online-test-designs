# .github/workflows/ethernet-test-build.yml
name: "Build: Ethernet Test"

on:
  push:
    paths:
      - "designs/ethernet-test/**"
      - "designs/_shared/**"
      - ".github/workflows/ethernet-test-build.yml"
  pull_request:
    paths:
      - "designs/ethernet-test/**"
      - "designs/_shared/**"
  workflow_dispatch:

jobs:
  build-arty:
    name: "Arty A7-35T (MII Ethernet)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install openXC7 toolchain and cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys gcc-riscv64-linux-gnu
          wget -q https://github.com/openXC7/openXC7-snap/releases/download/0.8.2/openxc7_0.8.2_amd64.snap
          sudo snap install --classic --dangerous ./openxc7_0.8.2_amd64.snap
          sudo snap alias openxc7.nextpnr-xilinx nextpnr-xilinx
          sudo snap alias openxc7.fasm2frames fasm2frames
          sudo snap alias openxc7.xc7frames2bit xc7frames2bit

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --extra build

      - name: Build Arty Ethernet SoC
        env:
          CHIPDB: ${{ github.workspace }}/chipdb
        run: |
          mkdir -p "$CHIPDB"
          uv run python designs/ethernet-test/gateware/ethernet_soc_arty.py \
            --variant a7-35 \
            --toolchain yosys+nextpnr \
            --build

      - name: Upload bitstream
        uses: actions/upload-artifact@v4
        with:
          name: ethernet-test-arty-a7-35t
          path: designs/ethernet-test/build/arty/gateware/digilent_arty.bit

  build-netv2:
    name: "NeTV2 (RMII Ethernet)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install openXC7 toolchain and cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys gcc-riscv64-linux-gnu
          wget -q https://github.com/openXC7/openXC7-snap/releases/download/0.8.2/openxc7_0.8.2_amd64.snap
          sudo snap install --classic --dangerous ./openxc7_0.8.2_amd64.snap
          sudo snap alias openxc7.nextpnr-xilinx nextpnr-xilinx
          sudo snap alias openxc7.fasm2frames fasm2frames
          sudo snap alias openxc7.xc7frames2bit xc7frames2bit

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --extra build

      - name: Build NeTV2 Ethernet SoC
        env:
          CHIPDB: ${{ github.workspace }}/chipdb
        run: |
          mkdir -p "$CHIPDB"
          uv run python designs/ethernet-test/gateware/ethernet_soc_netv2.py \
            --variant a7-35 \
            --toolchain yosys+nextpnr \
            --build

      - name: Upload bitstream
        uses: actions/upload-artifact@v4
        with:
          name: ethernet-test-netv2
          path: designs/ethernet-test/build/netv2/gateware/kosagi_netv2.bit

  lint:
    name: "Lint Python"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint
        run: uv run --extra dev ruff check designs/ethernet-test/gateware/ designs/ethernet-test/host/
