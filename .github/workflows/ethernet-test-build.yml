# .github/workflows/ethernet-test-build.yml
name: "Build: Ethernet Test"

on:
  push:
    paths:
      - "designs/ethernet-test/**"
      - "designs/_shared/**"
      - ".github/workflows/ethernet-test-build.yml"
  pull_request:
    paths:
      - "designs/ethernet-test/**"
      - "designs/_shared/**"
  workflow_dispatch:

jobs:
  build-arty:
    name: "Arty A7-35T (MII Ethernet)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys nextpnr-xilinx prjxray-tools

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --extra build

      - name: Build Arty Ethernet SoC
        run: |
          uv run python designs/ethernet-test/gateware/ethernet_soc_arty.py \
            --variant a7-35 \
            --toolchain yosys+nextpnr \
            --build

      - name: Upload bitstream
        uses: actions/upload-artifact@v4
        with:
          name: ethernet-test-arty-a7-35t
          path: designs/ethernet-test/build/arty/gateware/digilent_arty.bit

  build-netv2:
    name: "NeTV2 (RMII Ethernet)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys nextpnr-xilinx prjxray-tools

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --extra build

      - name: Build NeTV2 Ethernet SoC
        run: |
          uv run python designs/ethernet-test/gateware/ethernet_soc_netv2.py \
            --variant a7-35 \
            --toolchain yosys+nextpnr \
            --build

      - name: Upload bitstream
        uses: actions/upload-artifact@v4
        with:
          name: ethernet-test-netv2
          path: designs/ethernet-test/build/netv2/gateware/kosagi_netv2.bit

  lint:
    name: "Lint Python"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint
        run: uv run ruff check designs/ethernet-test/gateware/ designs/ethernet-test/host/
