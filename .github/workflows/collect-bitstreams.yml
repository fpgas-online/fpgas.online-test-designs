# .github/workflows/collect-bitstreams.yml
name: "Collect Bitstreams"

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  collect:
    name: "Bundle all bitstreams"
    runs-on: ubuntu-latest
    steps:
      - name: Wait for build workflows to complete
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          # Match all build job names (but not Lint or this workflow)
          check-regexp: "^(Arty|NeTV2|Fomu|TT FPGA|netv2)"
          wait-interval: 30
          allowed-conclusions: success

      - name: Download artifacts from all build workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p bitstreams

          # List all workflow runs for this commit
          runs=$(gh api "repos/${{ github.repository }}/actions/runs?head_sha=${{ github.sha }}&status=completed&per_page=100" \
            --jq '.workflow_runs[] | select(.conclusion == "success") | .id')

          for run_id in $runs; do
            # List artifacts for this run
            artifacts=$(gh api "repos/${{ github.repository }}/actions/runs/${run_id}/artifacts" \
              --jq '.artifacts[] | "\(.id) \(.name)"')

            while IFS=' ' read -r artifact_id artifact_name; do
              [ -z "$artifact_id" ] && continue
              echo "Downloading: ${artifact_name} (artifact ${artifact_id} from run ${run_id})"
              gh api "repos/${{ github.repository }}/actions/artifacts/${artifact_id}/zip" > "/tmp/${artifact_name}.zip"
              mkdir -p "bitstreams/${artifact_name}"
              unzip -o "/tmp/${artifact_name}.zip" -d "bitstreams/${artifact_name}"
              rm "/tmp/${artifact_name}.zip"
            done <<< "$artifacts"
          done

      - name: List collected bitstreams
        run: find bitstreams -type f | sort

      - name: Upload combined package
        uses: actions/upload-artifact@v4
        with:
          name: all-bitstreams
          path: bitstreams/
          if-no-files-found: error
