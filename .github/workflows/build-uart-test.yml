# .github/workflows/build-uart-test.yml
name: "Build: UART Test"

on:
  push:
    paths:
      - "designs/uart/**"
      - "designs/_shared/**"
      - ".github/workflows/build-uart-test.yml"
  pull_request:
    paths:
      - "designs/uart/**"
      - "designs/_shared/**"
  workflow_dispatch:

jobs:
  build-arty:
    name: "Arty A7-35T"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys nextpnr-xilinx prjxray-tools

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --extra build

      - name: Build Arty UART test bitstream
        run: |
          uv run python designs/uart/gateware/uart_soc_arty.py \
            --toolchain yosys+nextpnr \
            --build

      - name: Upload bitstream
        uses: actions/upload-artifact@v4
        with:
          name: uart-test-arty
          path: |
            designs/uart/build/arty/gateware/*.bit
          if-no-files-found: error

  build-netv2:
    name: "NeTV2"
    runs-on: ubuntu-latest
    steps:
