      - name: Upload bitstream
        uses: actions/upload-artifact@v4
        with:
          name: uart-test-netv2
          path: |
            designs/uart/build/netv2/gateware/*.bit
          if-no-files-found: error

  build-fomu:
    name: "Fomu EVT"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys nextpnr-ice40 fpga-icestorm

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --extra build

      - name: Build Fomu UART test bitstream
        run: |
          uv run python designs/uart/gateware/uart_soc_fomu.py \
            --build

      - name: Upload bitstream
        uses: actions/upload-artifact@v4
        with:
          name: uart-test-fomu
          path: |
            designs/uart/build/fomu/gateware/*.bin
          if-no-files-found: error

  build-tt:
    name: "TT FPGA Demo Board"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys nextpnr-ice40 fpga-icestorm

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --extra build

      - name: Build TT FPGA UART test bitstream
        run: |
          uv run python designs/uart/gateware/uart_soc_tt.py \
            --build

      - name: Upload bitstream
        uses: actions/upload-artifact@v4
        with:
          name: uart-test-tt-fpga
          path: |
            designs/uart/build/tt/gateware/*.bin
          if-no-files-found: error

  lint:
    name: "Lint Python"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint
        run: uv run ruff check designs/uart/gateware/
