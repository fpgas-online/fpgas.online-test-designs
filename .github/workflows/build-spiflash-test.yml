# .github/workflows/build-spiflash-test.yml
name: "Build: SPI Flash ID Test"

on:
  push:
    paths:
      - "designs/spi-flash-id/**"
      - "designs/_shared/**"
      - ".github/workflows/build-spiflash-test.yml"
  pull_request:
    paths:
      - "designs/spi-flash-id/**"
      - "designs/_shared/**"
  workflow_dispatch:

jobs:
  build-arty:
    name: "Arty A7-35T"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install openXC7 toolchain and cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys gcc-riscv64-unknown-elf picolibc-riscv64-unknown-elf
          wget -q https://github.com/openXC7/openXC7-snap/releases/download/0.8.2/openxc7_0.8.2_amd64.snap
          sudo snap install --classic --dangerous ./openxc7_0.8.2_amd64.snap
          sudo snap alias openxc7.nextpnr-xilinx nextpnr-xilinx
          sudo snap alias openxc7.fasm2frames fasm2frames
          sudo snap alias openxc7.xc7frames2bit xc7frames2bit
          sudo snap alias openxc7.bbasm bbasm

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --extra build

      - name: Build Arty SPI Flash test bitstream
        env:
          CHIPDB: ${{ github.workspace }}/chipdb
        run: |
          mkdir -p "$CHIPDB"
          uv run python designs/spi-flash-id/gateware/spiflash_soc_arty.py \
            --toolchain openxc7 \
            --build

      - name: Upload bitstream
        uses: actions/upload-artifact@v4
        with:
          name: spiflash-test-arty
          path: |
            designs/spi-flash-id/build/arty/gateware/*.bit
          if-no-files-found: error

  build-netv2:
    name: "NeTV2"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install openXC7 toolchain and cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys gcc-riscv64-unknown-elf picolibc-riscv64-unknown-elf
          wget -q https://github.com/openXC7/openXC7-snap/releases/download/0.8.2/openxc7_0.8.2_amd64.snap
          sudo snap install --classic --dangerous ./openxc7_0.8.2_amd64.snap
          sudo snap alias openxc7.nextpnr-xilinx nextpnr-xilinx
          sudo snap alias openxc7.fasm2frames fasm2frames
          sudo snap alias openxc7.xc7frames2bit xc7frames2bit
          sudo snap alias openxc7.bbasm bbasm

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --extra build

      - name: Build NeTV2 SPI Flash test bitstream
        env:
          CHIPDB: ${{ github.workspace }}/chipdb
        run: |
          mkdir -p "$CHIPDB"
          uv run python designs/spi-flash-id/gateware/spiflash_soc_netv2.py \
            --toolchain openxc7 \
            --build

      - name: Upload bitstream
        uses: actions/upload-artifact@v4
        with:
          name: spiflash-test-netv2
          path: |
            designs/spi-flash-id/build/netv2/gateware/*.bit
          if-no-files-found: error

  # NOTE: Fomu EVT and TT FPGA Demo Board SPI Flash builds are disabled.
  # The VexRiscv SoC + SPI Flash design exceeds the iCE40UP5K's 5280 LCs
  # (requires ~5326 LCs). These boards use S7SPIFlash which is Xilinx-specific
  # anyway; iCE40 boards would need a different SPI flash approach.

  lint:
    name: "Lint Python"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint
        run: uv run --extra dev ruff check designs/spi-flash-id/gateware/
