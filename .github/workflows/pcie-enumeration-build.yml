  lint:
    name: "Lint Python"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint
        run: uv run --extra dev ruff check designs/pcie-enumeration/gateware/ designs/pcie-enumeration/host/

