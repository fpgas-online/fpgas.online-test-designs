# .github/workflows/pcie-enumeration-build.yml
name: "Build: PCIe Enumeration"

on:
  push:
    paths:
      - "designs/pcie-enumeration/**"
      - "designs/_shared/**"
      - ".github/workflows/pcie-enumeration-build.yml"
  pull_request:
    paths:
      - "designs/pcie-enumeration/**"
      - "designs/_shared/**"
  workflow_dispatch:

jobs:
  build-netv2:
    name: "NeTV2 PCIe endpoint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install openXC7 toolchain and cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys gcc-riscv64-unknown-elf picolibc-riscv64-unknown-elf
          wget -q https://github.com/openXC7/openXC7-snap/releases/download/0.8.2/openxc7_0.8.2_amd64.snap
          sudo snap install --classic --dangerous ./openxc7_0.8.2_amd64.snap
          sudo snap alias openxc7.nextpnr-xilinx nextpnr-xilinx
          sudo snap alias openxc7.fasm2frames fasm2frames
          sudo snap alias openxc7.xc7frames2bit xc7frames2bit
          sudo snap alias openxc7.bbasm bbasm

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --extra build

      - name: Build PCIe SoC bitstream
        env:
          CHIPDB: ${{ github.workspace }}/chipdb
        run: |
          mkdir -p "$CHIPDB"
          uv run python designs/pcie-enumeration/gateware/pcie_soc_netv2.py \
            --variant a7-35 \
            --toolchain openxc7 \
            --build

      - name: Upload bitstream
        uses: actions/upload-artifact@v4
        with:
          name: pcie-enumeration-netv2
          path: designs/pcie-enumeration/build/netv2/gateware/kosagi_netv2.bit

  lint:
    name: "Lint Python"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint
        run: uv run --extra dev ruff check designs/pcie-enumeration/gateware/ designs/pcie-enumeration/host/
