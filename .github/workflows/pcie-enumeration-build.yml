      - name: Upload bitstream
        uses: actions/upload-artifact@v4
        with:
          name: pcie-enumeration-netv2-a7-100t
          path: designs/pcie-enumeration/build/netv2/gateware/kosagi_netv2.bit

  lint:
    name: "Lint Python"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint
        run: uv run --extra dev ruff check designs/pcie-enumeration/gateware/ designs/pcie-enumeration/host/

  build-acorn-cle-215plus:
    name: "Acorn CLE-215+"
    runs-on: ubuntu-latest
    container:
      image: regymm/openxc7
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install cross compiler and Python tooling
        run: |
          apt-get update
          apt-get install -y gcc-riscv64-unknown-elf curl git
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: uv sync --python 3.12 --extra build

      - name: Build Acorn CLE-215+ bitstream
        run: |
          uv run python designs/pcie-enumeration/gateware/pcie_soc_acorn.py \
            --variant cle-215+ \
            --toolchain openxc7 \
            --build

      - name: Upload bitstream
        uses: actions/upload-artifact@v4
        with:
          name: pcie-test-acorn-cle-215plus
          path: |
            designs/pcie-enumeration/build/acorn/gateware/*.bit
          if-no-files-found: error

