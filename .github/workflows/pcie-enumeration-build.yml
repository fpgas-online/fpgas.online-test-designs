# .github/workflows/pcie-enumeration-build.yml
name: "Build: PCIe Enumeration"

on:
  push:
    paths:
      - "designs/pcie-enumeration/**"
      - "designs/_shared/**"
      - ".github/workflows/pcie-enumeration-build.yml"
  pull_request:
    paths:
      - "designs/pcie-enumeration/**"
      - "designs/_shared/**"
  workflow_dispatch:

jobs:
  build-netv2:
    name: "NeTV2 PCIe endpoint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys nextpnr-xilinx prjxray-tools

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --extra build

      - name: Build PCIe SoC bitstream
        run: |
          uv run python designs/pcie-enumeration/gateware/pcie_soc_netv2.py \
            --variant a7-35 \
            --toolchain yosys+nextpnr \
            --build

      - name: Upload bitstream
        uses: actions/upload-artifact@v4
        with:
          name: pcie-enumeration-netv2
          path: designs/pcie-enumeration/build/netv2/gateware/kosagi_netv2.bit

  lint:
    name: "Lint Python"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Lint
        run: uv run ruff check designs/pcie-enumeration/gateware/ designs/pcie-enumeration/host/
