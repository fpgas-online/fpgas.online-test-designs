# .github/workflows/pcie-enumeration-build.yml
name: "Build: PCIe Enumeration"

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-netv2-a7-35:
    name: "NeTV2 A7-35T PCIe endpoint"
    runs-on: ubuntu-latest
    container:
      image: regymm/openxc7
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install cross compiler and Python tooling
        run: |
          apt-get update
          apt-get install -y gcc-riscv64-unknown-elf curl git
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "/prjxray/env/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: uv sync --python 3.12 --extra build

      - name: Patch GTP site types for bracket-form port names
        run: |
          uv run python designs/_shared/patch_gtp_sitetype.py \
            /nextpnr-xilinx/xilinx/external/nextpnr-xilinx-meta/artix7/site_type_GTPE2_CHANNEL.json \
            /nextpnr-xilinx/xilinx/external/nextpnr-xilinx-meta/artix7/site_type_GTPE2_COMMON.json

      - name: Clear stale chipdb cache
        run: rm -f /chipdb/*.bin

      - name: Install FASM GTP fixup wrapper
        run: |
          [ -f /prjxray/env/bin/fasm2frames.real ] || mv /prjxray/env/bin/fasm2frames /prjxray/env/bin/fasm2frames.real
          cp designs/_shared/fasm2frames_wrapper.py /prjxray/env/bin/fasm2frames
          chmod +x /prjxray/env/bin/fasm2frames

      - name: Build NeTV2 A7-35T PCIe SoC bitstream
        env:
          CHIPDB: /chipdb
          PRJXRAY_DB_DIR: /nextpnr-xilinx/xilinx/external/prjxray-db
          NEXTPNR_XILINX_PYTHON_DIR: /nextpnr-xilinx/xilinx/python
        run: |
          uv run python designs/pcie-enumeration/gateware/pcie_soc_netv2.py \
            --variant a7-35 \
            --toolchain openxc7 \
            --build

      - name: Upload bitstream
        uses: actions/upload-artifact@v4
        with:
          name: pcie-enumeration-netv2-a7-35t
          path: designs/pcie-enumeration/build/netv2/gateware/kosagi_netv2.bit

