# OpenOCD configuration for NeTV2 JTAG via RPi5 sysfsgpio.
#
# GPIO numbers are sysfs-mapped: base 571 (RP1 gpiochip) + GPIO offset.
#
# GPIO mapping:
#   TCK  = GPIO4  → sysfs 575
#   TMS  = GPIO17 → sysfs 588
#   TDI  = GPIO27 → sysfs 598
#   TDO  = GPIO22 → sysfs 593
#   SRST = GPIO24 → sysfs 595

adapter driver sysfsgpio
sysfsgpio jtag_nums 575 588 598 593
sysfsgpio srst_num 595

# ---- JTAG config ----
adapter speed 1000
transport select jtag
reset_config srst_only

# ---- Target: Xilinx XC7A100T (NeTV2) ----
# Use -ignore-version to match any die stepping.
jtag newtap xc7 tap -irlen 6 -ignore-version -expected-id 0x03631093

# Create PLD device WITHOUT -no_jstart so the FPGA starts after loading.
pld create xc7.pld virtex2 -chain-position xc7.tap
