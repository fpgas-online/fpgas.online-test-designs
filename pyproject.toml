[project]
name = "fpgas-online-test-designs"
version = "0.1.0"
description = "Automated FPGA hardware verification test designs for fpgas.online"
requires-python = ">=3.9"
license = "Apache-2.0"
dependencies = [
    "pyserial>=3.5",
]

[project.optional-dependencies]
build = [
    "litex",
    "litex-boards",
    "migen",
]

[tool.hatch.build.targets.wheel]
packages = ["designs"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
